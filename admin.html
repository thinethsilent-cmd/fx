<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thinz fx | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(229, 231, 235, 1); }
        /* Style adjustments to match your screenshot */
        .brand-text { color: #ff4d4d; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-gray-900 tracking-tighter">ADMIN PANEL</h1>
                <p class="text-gray-500 font-medium italic">Gestion des accès <span class="brand-text font-bold">Hacker Aviator</span></p>
            </div>
            <div class="flex items-center gap-2">
                <span id="authStatus" class="px-3 py-1 bg-gray-200 text-gray-600 text-xs font-bold rounded-full uppercase tracking-widest transition-all">Connexion...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Generator -->
            <div class="lg:col-span-1">
                <div class="glass-card p-6 rounded-3xl shadow-sm border-t-4 border-t-red-500">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Générer une clé</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">Durée de validité</label>
                            <select id="durationSelect" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl font-medium focus:ring-2 focus:ring-red-500 outline-none">
                                <option value="60">1 Heure</option>
                                <option value="1440">24 Heures</option>
                                <option value="10080">7 Jours</option>
                                <option value="43200">30 Jours</option>
                                <option value="525600">1 An</option>
                            </select>
                        </div>

                        <button id="generateBtn" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-red-100 flex items-center justify-center gap-2 active:scale-95">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            CRÉER UNE CLÉ
                        </button>
                    </div>

                    <div id="newKeyDisplay" class="mt-6 p-4 bg-green-50 border border-green-100 rounded-xl hidden">
                        <p class="text-[10px] text-green-600 font-bold uppercase mb-1">Clé générée avec succès</p>
                        <div class="flex items-center justify-between">
                            <span id="generatedKeyValue" class="font-mono font-bold text-green-800 text-lg">---</span>
                            <button onclick="copyKey()" class="text-green-600 hover:text-green-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: List -->
            <div class="lg:col-span-2">
                <div class="glass-card rounded-3xl shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white">
                        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Clés Actives</h2>
                        <button id="refreshBtn" class="text-gray-400 hover:text-red-500 transition-colors p-2 rounded-lg hover:bg-gray-50">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-[10px] font-bold text-gray-400 uppercase tracking-wider">
                                <tr>
                                    <th class="px-6 py-4">Clé</th>
                                    <th class="px-6 py-4">Expiration</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="keysTableBody" class="divide-y divide-gray-100">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                    <div id="emptyState" class="p-12 text-center text-gray-400 hidden font-medium">
                        <svg class="w-12 h-12 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                        Aucune clé active trouvée.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Configuration (Matching index.html)
        const firebaseConfig = {
            apiKey: "AIzaSyAu2rosyyF2AJi_hVo-8XhXGsofTJ9zzdQ",
            authDomain: "myapp-1bc82.firebaseapp.com",
            projectId: "myapp-1bc82",
            storageBucket: "myapp-1bc82.firebasestorage.app",
            messagingSenderId: "723618358633",
            appId: "1:723618358633:web:24c6a343707c53de7009f8",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const keysTableBody = document.getElementById('keysTableBody');
        const emptyState = document.getElementById('emptyState');
        const authStatus = document.getElementById('authStatus');

        // Connect to Firebase - Ensure anonymous login is successful
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Auth failed:", err);
                authStatus.textContent = "Erreur Auth";
                authStatus.classList.replace('bg-gray-200', 'bg-red-100');
                authStatus.classList.replace('text-gray-600', 'text-red-600');
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authStatus.textContent = "Connecté";
                authStatus.classList.replace('bg-gray-200', 'bg-green-100');
                authStatus.classList.replace('text-gray-600', 'text-green-600');
                fetchKeys();
            } else {
                initAuth();
            }
        });

        async function fetchKeys() {
            try {
                keysTableBody.innerHTML = '';
                // Mandatory path: /artifacts/{appId}/public/data/{collectionName}
                const keysCollection = collection(db, 'artifacts', appId, 'public', 'data', 'keys');
                const querySnapshot = await getDocs(keysCollection);
                
                if (querySnapshot.empty) {
                    emptyState.classList.remove('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const key = doc.id;
                    const expiration = new Date(data.expiresAt);
                    const isExpired = Date.now() > data.expiresAt;

                    const row = document.createElement('tr');
                    row.className = "hover:bg-gray-50 transition-colors border-b border-gray-50 last:border-0";
                    row.innerHTML = `
                        <td class="px-6 py-4 font-mono font-bold text-sm text-gray-700">${key}</td>
                        <td class="px-6 py-4 text-xs text-gray-500 font-medium">${expiration.toLocaleString()}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase ${isExpired ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                ${isExpired ? 'Expiré' : 'Actif'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteKey('${key}')" class="text-gray-300 hover:text-red-500 transition-colors p-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </td>
                    `;
                    keysTableBody.appendChild(row);
                });
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        async function generateKey() {
            if (!auth.currentUser) {
                alert("Attente de connexion...");
                return;
            }

            const durationMinutes = parseInt(document.getElementById('durationSelect').value);
            const randomId = Math.random().toString(36).substring(2, 6).toUpperCase() + Math.random().toString(36).substring(2, 6).toUpperCase();
            const fullKey = `THINXFX-${randomId.substring(0, 4)}`;
            const expiresAt = Date.now() + (durationMinutes * 60 * 1000);

            const generateBtn = document.getElementById('generateBtn');
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50');

            try {
                // Important: Using explicit doc path matching the rules
                const keyDoc = doc(db, 'artifacts', appId, 'public', 'data', 'keys', fullKey);
                await setDoc(keyDoc, {
                    expiresAt: expiresAt,
                    createdAt: Date.now()
                });
                
                document.getElementById('generatedKeyValue').textContent = fullKey;
                document.getElementById('newKeyDisplay').classList.remove('hidden');
                fetchKeys();
            } catch (e) {
                console.error("Firestore Error:", e);
                // Help user diagnose permission issues
                if (e.code === 'permission-denied') {
                    alert("Erreur: Permission refusée. Vérifiez vos règles Firestore (Rules).");
                } else {
                    alert("Erreur lors de la création: " + e.message);
                }
            } finally {
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-50');
            }
        }

        window.deleteKey = async (key) => {
            if (confirm(`Voulez-vous supprimer la clé ${key} ?`)) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'keys', key));
                    fetchKeys();
                } catch (e) {
                    alert("Impossible de supprimer: " + e.message);
                }
            }
        }

        window.copyKey = () => {
            const key = document.getElementById('generatedKeyValue').textContent;
            const el = document.createElement('textarea');
            el.value = key;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Clé copiée !");
        }

        document.getElementById('generateBtn').addEventListener('click', generateKey);
        document.getElementById('refreshBtn').addEventListener('click', fetchKeys);
    </script>
</body>
</html>
